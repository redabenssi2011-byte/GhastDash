<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghast Bot | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0b14 100%);
            color: #fff;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding-top: 70px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255, 105, 180, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 105, 180, 0.3);
            z-index: 100;
            padding: 0.8rem 2rem;
        }

        .nav-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: #ff69b4;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ff69b4;
            object-fit: cover;
        }

        .username {
            font-weight: 500;
        }

        .logout-btn {
            background: rgba(255, 105, 180, 0.2);
            border: 1px solid rgba(255, 105, 180, 0.3);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            color: #ff69b4;
        }

        .logout-btn:hover {
            background: rgba(255, 105, 180, 0.4);
        }

        /* Container */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Welcome Card */
        .welcome-card {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 105, 180, 0.25);
            border-radius: 28px;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .welcome-card h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #ff69b4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .welcome-card p {
            color: #aaa;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(15, 15, 25, 0.7);
            border: 1px solid rgba(255, 105, 180, 0.2);
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            transition: 0.2s;
        }

        .stat-card:hover {
            border-color: #ff69b4;
            transform: translateY(-3px);
        }

        .stat-icon {
            font-size: 2rem;
            color: #ff69b4;
            margin-bottom: 0.5rem;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* Servers Grid */
        .section-title {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.3rem;
        }

        .server-card {
            background: rgba(15, 15, 25, 0.8);
            border: 1px solid rgba(255, 105, 180, 0.2);
            border-radius: 20px;
            padding: 1.3rem;
            transition: 0.2s;
        }

        .server-card:hover {
            border-color: #ff69b4;
            transform: translateY(-3px);
        }

        .server-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .server-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            background: #2a2a3a;
        }

        .server-icon-placeholder {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .server-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .server-owner {
            font-size: 0.7rem;
            color: #ff69b4;
        }

        .server-status {
            font-size: 0.8rem;
            margin-bottom: 1rem;
            padding: 0.3rem 0;
        }

        .status-active {
            color: #00ff88;
        }

        .status-inactive {
            color: #ff69b4;
        }

        .btn-manage, .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            transition: 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
            justify-content: center;
        }

        .btn-manage {
            background: #ff69b4;
            color: #0a0a0a;
        }

        .btn-add {
            background: #5865F2;
            color: white;
        }

        .btn-manage:hover, .btn-add:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        /* Server Stats Mini */
        .server-mini-stats {
            display: flex;
            justify-content: space-around;
            margin: 1rem 0;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            font-size: 0.7rem;
        }

        .server-mini-stats span i {
            color: #ff69b4;
            margin-right: 4px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #ff69b4;
        }

        /* Login Required */
        .login-required {
            text-align: center;
            padding: 3rem;
        }

        .login-btn {
            background: #5865F2;
            color: white;
            padding: 14px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 1rem;
            transition: 0.2s;
        }

        .login-btn:hover {
            transform: scale(1.02);
            background: #4752c4;
        }

        .footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 105, 180, 0.2);
            padding-top: 1.2rem;
        }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            .nav-container { flex-direction: column; }
            body { padding-top: 100px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="support.html">Support</a>
                <a href="about.html">About</a>
                <a href="#" id="discordNavLink">Discord</a>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <span class="username" id="username"></span>
                <img class="user-avatar" id="userAvatar" alt="Avatar">
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container" id="mainContainer">
        <!-- Content will be loaded here -->
        <div class="loading">
            <i class="fas fa-spinner fa-spin"></i> Loading...
        </div>
    </div>

    <script>
        // API Base URL - Change this to your Wispbyte backend URL
        const API_BASE = 'https://your-wispbyte-project.wispbyte.gg';
        
        // Check if user is logged in
        async function checkAuth() {
            const token = localStorage.getItem('ghast_token');
            if (!token) {
                showLoginPage();
                return false;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/verify`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const user = await response.json();
                    showDashboard(user);
                    return true;
                } else {
                    localStorage.removeItem('ghast_token');
                    showLoginPage();
                    return false;
                }
            } catch (error) {
                showLoginPage();
                return false;
            }
        }
        
        function showLoginPage() {
            document.getElementById('mainContainer').innerHTML = `
                <div class="login-required">
                    <i class="fab fa-discord" style="font-size: 4rem; color: #5865F2;"></i>
                    <h2 style="margin: 1rem 0;">Welcome to Ghast Dashboard</h2>
                    <p>Login with Discord to manage your servers</p>
                    <a href="${API_BASE}/auth/discord" class="login-btn">
                        <i class="fab fa-discord"></i> Login with Discord
                    </a>
                </div>
            `;
            document.getElementById('userInfo').style.display = 'none';
        }
        
        async function showDashboard(user) {
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('username').innerText = user.username;
            document.getElementById('userAvatar').src = user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png';
            
            // Load dashboard content
            await loadDashboardContent();
        }
        
        async function loadDashboardContent() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading your servers...</div>';
            
            try {
                const token = localStorage.getItem('ghast_token');
                const response = await fetch(`${API_BASE}/api/guilds`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.guilds) {
                    renderDashboard(data);
                } else {
                    container.innerHTML = '<div class="welcome-card"><p>Failed to load servers. Please try again.</p></div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="welcome-card"><p>Error connecting to server. Make sure the backend is running.</p></div>';
            }
        }
        
        function renderDashboard(data) {
            const { user, guilds, stats } = data;
            const managedGuilds = guilds.filter(g => g.isBotIn);
            const availableGuilds = guilds.filter(g => !g.isBotIn && g.permissions >= 0x20);
            
            const html = `
                <div class="welcome-card">
                    <h1><i class="fas fa-waveform"></i> Welcome back, ${user.username}!</h1>
                    <p>Manage your servers, configure modules, and monitor activity from one place.</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-server"></i></div>
                        <div class="stat-number">${stats.totalServers}</div>
                        <div class="stat-label">Total Servers</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-number">${stats.botServers}</div>
                        <div class="stat-label">With Ghast Bot</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-number">${stats.totalMembers || '--'}</div>
                        <div class="stat-label">Total Members</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-number">${stats.onlineMembers || '--'}</div>
                        <div class="stat-label">Online Now</div>
                    </div>
                </div>
                
                ${managedGuilds.length > 0 ? `
                    <div class="section-title">
                        <i class="fas fa-crown" style="color: #ff69b4;"></i>
                        <span>Managed Servers (${managedGuilds.length})</span>
                    </div>
                    <div class="servers-grid">
                        ${managedGuilds.map(guild => `
                            <div class="server-card">
                                <div class="server-header">
                                    ${guild.icon ? `<img src="${guild.icon}" class="server-icon">` : `<div class="server-icon-placeholder"><i class="fas fa-server"></i></div>`}
                                    <div>
                                        <div class="server-name">${guild.name}</div>
                                        ${guild.owner ? '<div class="server-owner"><i class="fas fa-crown"></i> Owner</div>' : ''}
                                    </div>
                                </div>
                                <div class="server-status">
                                    <span class="status-active"><i class="fas fa-check-circle"></i> Bot Active</span>
                                </div>
                                <div class="server-mini-stats" id="stats-${guild.id}">
                                    <span><i class="fas fa-user"></i> --</span>
                                    <span><i class="fas fa-hashtag"></i> --</span>
                                    <span><i class="fas fa-bolt"></i> --</span>
                                </div>
                                <button onclick="manageServer('${guild.id}')" class="btn-manage">
                                    <i class="fas fa-sliders-h"></i> Manage Server
                                </button>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                
                ${availableGuilds.length > 0 ? `
                    <div class="section-title" style="margin-top: 2rem;">
                        <i class="fas fa-plus-circle" style="color: #5865F2;"></i>
                        <span>Available Servers (${availableGuilds.length})</span>
                    </div>
                    <div class="servers-grid">
                        ${availableGuilds.map(guild => `
                            <div class="server-card">
                                <div class="server-header">
                                    ${guild.icon ? `<img src="${guild.icon}" class="server-icon">` : `<div class="server-icon-placeholder"><i class="fas fa-server"></i></div>`}
                                    <div>
                                        <div class="server-name">${guild.name}</div>
                                        ${guild.owner ? '<div class="server-owner"><i class="fas fa-crown"></i> Owner</div>' : ''}
                                    </div>
                                </div>
                                <div class="server-status">
                                    <span class="status-inactive"><i class="fas fa-plus-circle"></i> Bot Not Added</span>
                                </div>
                                <button onclick="addBot('${guild.id}')" class="btn-add">
                                    <i class="fab fa-discord"></i> Add Ghast Bot
                                </button>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                
                ${managedGuilds.length === 0 && availableGuilds.length === 0 ? `
                    <div class="welcome-card">
                        <i class="fas fa-folder-open" style="font-size: 3rem; color: #ff69b4;"></i>
                        <h2>No Servers Found</h2>
                        <p>You don't have any servers or you don't have permission to manage them.</p>
                    </div>
                ` : ''}
                
                <div class="footer">
                    <i class="fas fa-shield-alt"></i> Ghast Bot Dashboard • HooxCompany™ • No CopyRight ©
                </div>
            `;
            
            container.innerHTML = html;
            
            // Load stats for managed servers
            managedGuilds.forEach(guild => {
                loadServerStats(guild.id);
            });
        }
        
        async function loadServerStats(guildId) {
            try {
                const token = localStorage.getItem('ghast_token');
                const response = await fetch(`${API_BASE}/api/guild-stats/${guildId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const stats = await response.json();
                const statsDiv = document.getElementById(`stats-${guildId}`);
                if (statsDiv && stats) {
                    statsDiv.i
